services:
  zookeeper:
    image: wurstmeister/zookeeper:latest
    container_name: atmosflow-zookeeper
    ports:
      - "2181:2181"
    restart: always

  kafka:
    image: wurstmeister/kafka:latest
    container_name: atmosflow-kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://127.0.0.1:9092,PLAINTEXT_INTERNAL://kafka:29092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      - KAFKA_INTER_BROKER_PROTOCOL_NAME=PLAINTEXT
    depends_on:
      - zookeeper
    restart: always

  postgres:
    image: postgres:latest
    container_name: atmosflow-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - TZ=Asia/Ho_Chi_Minh
      - PGTZ=Asia/Ho_Chi_Minh
    volumes:
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: always

  producer:
    build: ./producer
    container_name: atmosflow-producer
    restart: always
    environment:
      - KAFKA_BROKER=${KAFKA_BROKER_INTERNAL}
      - KAFKA_TOPIC=${KAFKA_TOPIC}
      - WEATHER_API_KEY=${WEATHER_API_KEY}
    depends_on:
      - kafka

  consumer:
    build: ./consumer
    container_name: atmosflow-consumer
    restart: always
    environment:
      - KAFKA_BROKER=${KAFKA_BROKER_INTERNAL}
      - KAFKA_TOPIC=${KAFKA_TOPIC}
      - DB_HOST=postgres
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    depends_on:
      - kafka
      - postgres

  grafana:
    image: grafana/grafana:latest
    container_name: atmosflow-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin_123
    depends_on:
      - postgres
    restart: always

  # --- AIRFLOW DATABASE ---
  postgres-airflow:
    image: postgres:13
    container_name: atmosflow-airflow-db
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
    restart: always

  # --- SERVICE: Khởi tạo Database cho Airflow ---
  airflow-init:
    image: apache/airflow:2.7.1-python3.10
    container_name: atmosflow-airflow-init
    depends_on:
      - postgres-airflow
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres-airflow/airflow
    command: version
    entrypoint: /bin/bash -c "airflow db init"

  # --- AIRFLOW WEB SERVER ---
  airflow-webserver:
    image: apache/airflow:2.7.1-python3.10
    container_name: atmosflow-airflow-webserver
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres-airflow:
        condition: service_started
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres-airflow/airflow
      - AIRFLOW__CORE__FERNET_KEY=fbP_rA1S_L8y6z0v_yM-v7F0-6u_Y6B_fA_T
      - AIRFLOW__WEBSERVER__SECRET_KEY=atmosflow_secret_key_0027
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
    ports:
      - "8081:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - /var/run/docker.sock:/var/run/docker.sock
    command: webserver

  # --- AIRFLOW SCHEDULER ---
  airflow-scheduler:
    image: apache/airflow:2.7.1-python3.10
    container_name: atmosflow-airflow-scheduler
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres-airflow:
        condition: service_started
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres-airflow/airflow
      - AIRFLOW__CORE__FERNET_KEY=fbP_rA1S_L_y6z0v_yM-v7F0-6u_Y6B_fA_T
      - AIRFLOW__WEBSERVER__SECRET_KEY=atmosflow_secret_key_0027
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
    volumes:
      - ./dags:/opt/airflow/dags
      - /var/run/docker.sock:/var/run/docker.sock
    command: scheduler

  # --- DBT SERVICE ---
  dbt:
    image: ghcr.io/dbt-labs/dbt-postgres:1.7.0
    container_name: atmosflow-dbt
    volumes:
      - ./dbt_project:/usr/app
      - ./.dbt:/root/.dbt
    environment:
      - AIRFLOW__CORE__FERNET_KEY=atmosflow_secret_key_0027
    # Giữ container luôn chạy ở trạng thái chờ
    entrypoint: ["tail", "-f", "/dev/null"]
    networks:
      - default