services:
  zookeeper:
    image: wurstmeister/zookeeper:latest
    container_name: atmosflow-zookeeper
    ports:
      - "2181:2181"
    restart: always

  kafka:
    image: wurstmeister/kafka:latest
    container_name: atmosflow-kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://127.0.0.1:9092,PLAINTEXT_INTERNAL://kafka:29092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      - KAFKA_INTER_BROKER_PROTOCOL_NAME=PLAINTEXT
    depends_on:
      - zookeeper
    restart: always

  postgres:
    image: postgres:latest
    container_name: atmosflow-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - TZ=Asia/Ho_Chi_Minh
      - PGTZ=Asia/Ho_Chi_Minh
    volumes:
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: always

  producer:
    build: ./producer
    container_name: atmosflow-producer
    restart: always
    environment:
      - KAFKA_BROKER=${KAFKA_BROKER_INTERNAL}
      - KAFKA_TOPIC=${KAFKA_TOPIC}
      - WEATHER_API_KEY=${WEATHER_API_KEY}
    depends_on:
      - kafka

  consumer:
    build: ./consumer
    container_name: atmosflow-consumer
    restart: always
    environment:
      - KAFKA_BROKER=${KAFKA_BROKER_INTERNAL}
      - KAFKA_TOPIC=${KAFKA_TOPIC}
      - DB_HOST=postgres
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    depends_on:
      - kafka
      - postgres

  grafana:
    image: grafana/grafana:latest
    container_name: atmosflow-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin_123
    depends_on:
      - postgres
    restart: always